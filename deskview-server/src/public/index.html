<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DeskLink Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }
    #join-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 20; flex-direction: column; gap: 12px; }
    #join-panel h2 { color: #ccc; font-size: 22px; }
    #join-panel input { padding: 12px 16px; font-size: 20px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #eee; text-align: center; letter-spacing: 8px; text-transform: uppercase; width: 180px; outline: none; }
    #join-panel button { padding: 12px 40px; background: #0f3460; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
    #join-panel .hint { color: #666; font-size: 13px; }
    #status { padding: 8px 12px; background: #111; color: #888; font-size: 12px; flex-shrink: 0; text-align: center; }
    #screen-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; touch-action: none; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .placeholder { color: #333; font-size: 16px; text-align: center; padding: 20px; line-height: 1.6; }
    .placeholder small { display: block; margin-top: 8px; font-size: 12px; color: #444; }
    #kbd-btn { position: fixed; bottom: 16px; right: 16px; z-index: 10; width: 48px; height: 48px; border-radius: 50%; background: #0f3460; color: #fff; border: none; font-size: 22px; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    #kbd-btn.active { background: #e94560; }
    #kbd-input { position: fixed; left: 0; top: 0; width: 1px; height: 1px; opacity: 0; z-index: -1; }
    @media (max-width: 600px) { #status { font-size: 10px; padding: 4px 8px; } }
  </style>
</head>
<body>
  <div id="join-panel">
    <h2>DeskLink</h2>
    <input type="text" id="roomInput" placeholder="Code" maxlength="4" autofocus />
    <button id="connectBtn">Connect</button>
    <span class="hint">Enter the room code from the Agent</span>
  </div>

  <div id="status">Status: Loading...</div>
  <div id="screen-container">
    <div class="placeholder">Waiting for remote desktop...<br/><small>Connect to a room to begin</small></div>
  </div>

  <button id="kbd-btn">&#x2328;</button>
  <input type="text" id="kbd-input" autocomplete="off" autocorrect="off" autocapitalize="off" />

  <script type="module">
    import { MessageType, signalUrl } from '/shared/protocol.js';
    import { SignalingClient } from '/shared/signaling.js';
    import { WebRTCManager } from '/shared/webrtc.js';

    // ---- State ----
    let signaling, webrtc, videoEl;
    let keyboardActive = false;

    // ---- DOM refs ----
    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const screenContainer = $('screen-container');
    const roomInput = $('roomInput');
    const connectBtn = $('connectBtn');
    const joinPanel = $('join-panel');
    const kbdBtn = $('kbd-btn');
    const kbdInput = $('kbd-input');

    function setStatus(text) {
      statusEl.textContent = 'Status: ' + text;
    }

    setStatus('Ready');

    // ---- Connect ----
    function doConnect(code) {
      joinPanel.style.display = 'none';
      setStatus('Connecting...');

      signaling = new SignalingClient({
        url: signalUrl(location.hostname, parseInt(location.port) || 3099),
        onMessage: async (msg) => {
          switch (msg.type) {
            case MessageType.JOIN_SUCCESS:
              setStatus('Joined, waiting for agent...');
              break;
            case MessageType.JOIN_ERROR:
              setStatus('Join failed: ' + msg.error);
              cleanup();
              showJoinPanel('Room not found');
              break;
            case MessageType.AGENT_READY:
              setupWebRTC();
              break;
            case MessageType.OFFER:
              if (!webrtc) setupWebRTC();
              await webrtc.handleOffer(msg.sdp);
              setStatus('Connected');
              break;
            case MessageType.ICE_CANDIDATE:
              if (msg.candidate && webrtc) await webrtc.addIceCandidate(msg.candidate);
              break;
            case MessageType.PEER_GONE:
              setStatus('Agent disconnected');
              cleanup();
              showPlaceholder();
              break;
          }
        },
        onStateChange: (state) => {
          if (state === 'disconnected') setStatus('Server disconnected');
        },
      });

      signaling.connect();
      signaling.send(MessageType.REGISTER, { role: 'client', room: code });
    }

    // Connect button
    connectBtn.onclick = () => {
      const code = roomInput.value.trim().toUpperCase();
      if (code.length !== 4) {
        roomInput.style.borderColor = '#e94560';
        roomInput.placeholder = 'Enter 4-letter code';
        setTimeout(() => {
          roomInput.style.borderColor = '#333';
          roomInput.placeholder = 'Code';
        }, 1500);
        return;
      }
      doConnect(code);
    };

    // Room input: handle both normal typing and IME composition
    let composing = false;
    roomInput.addEventListener('compositionstart', () => { composing = true; });
    roomInput.addEventListener('compositionend', () => {
      composing = false;
      const code = roomInput.value.trim().toUpperCase();
      if (code.length === 4) doConnect(code);
    });
    roomInput.addEventListener('input', () => {
      if (composing) return;
      const code = roomInput.value.trim().toUpperCase();
      if (code.length === 4) doConnect(code);
    });

    // ---- WebRTC ----
    function setupWebRTC() {
      webrtc = new WebRTCManager({
        role: 'client',
        onSignal: (msg) => {
          if (msg.type === 'offer' || msg.type === 'answer' || msg.type === 'ice-candidate') {
            signaling.send(msg.type, msg);
          }
        },
        onTrack: (stream) => {
          setStatus('Connected');
          screenContainer.innerHTML = '';
          videoEl = document.createElement('video');
          videoEl.srcObject = stream;
          videoEl.autoplay = true;
          videoEl.playsInline = true;
          videoEl.muted = true;
          // Touch events
          videoEl.addEventListener('touchstart', onTouchStart, { passive: false });
          videoEl.addEventListener('touchmove', onTouchMove, { passive: false });
          videoEl.addEventListener('touchend', onTouchEnd, { passive: false });
          // Mouse events (desktop)
          videoEl.addEventListener('mousemove', onMouseMove);
          videoEl.addEventListener('mousedown', onMouseDown);
          videoEl.addEventListener('mouseup', onMouseUp);
          videoEl.addEventListener('wheel', onWheel, { passive: false });
          screenContainer.appendChild(videoEl);
          kbdBtn.style.display = 'flex';
          setupKeyboard();
        },
        onStateChange: (state) => {
          if (state === 'failed' || state === 'disconnected') {
            setStatus('Connection lost');
            showPlaceholder();
          }
        },
      });
    }

    // ---- Control helpers ----
    function sendControl(msg) {
      if (webrtc) webrtc.sendData(msg);
    }

    function getVideoRatio(clientX, clientY) {
      if (!videoEl) return { x: 0, y: 0 };
      const rect = videoEl.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
        y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
      };
    }

    // ---- Touch handling ----
    function onTouchStart(e) {
      e.preventDefault();
      const t = e.touches[0];
      const { x, y } = getVideoRatio(t.clientX, t.clientY);
      sendControl({ type: 'mouse-move', x, y });
      sendControl({ type: 'mouse-down', button: 'left' });
    }
    function onTouchMove(e) {
      e.preventDefault();
      const t = e.touches[0];
      const { x, y } = getVideoRatio(t.clientX, t.clientY);
      sendControl({ type: 'mouse-move', x, y });
    }
    function onTouchEnd(e) {
      e.preventDefault();
      sendControl({ type: 'mouse-up', button: 'left' });
    }

    // ---- Mouse handling ----
    const BTN = { 0: 'left', 1: 'middle', 2: 'right' };
    function onMouseMove(e) {
      const { x, y } = getVideoRatio(e.clientX, e.clientY);
      sendControl({ type: 'mouse-move', x, y });
    }
    function onMouseDown(e) {
      const { x, y } = getVideoRatio(e.clientX, e.clientY);
      sendControl({ type: 'mouse-move', x, y });
      sendControl({ type: 'mouse-down', button: BTN[e.button] || 'left' });
    }
    function onMouseUp(e) {
      sendControl({ type: 'mouse-up', button: BTN[e.button] || 'left' });
    }
    function onWheel(e) {
      e.preventDefault();
      sendControl({ type: 'mouse-wheel', deltaX: e.deltaX, deltaY: e.deltaY });
    }

    // ---- Keyboard ----
    function setupKeyboard() {
      kbdBtn.onclick = () => {
        if (keyboardActive) {
          kbdInput.blur();
        } else {
          kbdInput.value = '';
          kbdInput.focus();
        }
      };

      kbdInput.addEventListener('focus', () => {
        keyboardActive = true;
        kbdBtn.classList.add('active');
      });
      kbdInput.addEventListener('blur', () => {
        keyboardActive = false;
        kbdBtn.classList.remove('active');
      });

      let pendingKey = null;

      kbdInput.addEventListener('keydown', (e) => {
        if (e.keyCode === 229 || e.key === 'Unidentified' || e.key === 'Process') {
          pendingKey = null;
          e.preventDefault();
          return;
        }
        pendingKey = e.key;
        sendControl({ type: 'key-down', key: e.key, code: e.code, shiftKey: e.shiftKey, ctrlKey: e.ctrlKey, altKey: e.altKey, metaKey: e.metaKey });
        e.preventDefault();
      });

      kbdInput.addEventListener('keyup', (e) => {
        if (e.keyCode === 229 || e.key === 'Unidentified' || e.key === 'Process') {
          e.preventDefault();
          return;
        }
        sendControl({ type: 'key-up', key: e.key, code: e.code, shiftKey: e.shiftKey, ctrlKey: e.ctrlKey, altKey: e.altKey, metaKey: e.metaKey });
        pendingKey = null;
        e.preventDefault();
      });

      kbdInput.addEventListener('beforeinput', (e) => {
        if (pendingKey !== null) return;
        if (e.inputType === 'insertText' && e.data) {
          for (const ch of e.data) {
            sendControl({ type: 'key-down', key: ch, code: '', shiftKey: false, ctrlKey: false, altKey: false, metaKey: false });
            sendControl({ type: 'key-up', key: ch, code: '', shiftKey: false, ctrlKey: false, altKey: false, metaKey: false });
          }
        }
        e.preventDefault();
      });
    }

    // ---- Cleanup ----
    function cleanup() {
      if (webrtc) { webrtc.destroy(); webrtc = null; }
      if (signaling) { signaling.disconnect(); signaling = null; }
      videoEl = null;
      kbdBtn.style.display = 'none';
      kbdBtn.classList.remove('active');
      keyboardActive = false;
      kbdInput.blur();
    }

    function showPlaceholder() {
      screenContainer.innerHTML = '<div class="placeholder">Waiting for remote desktop...<br/><small>Connect to a room to begin</small></div>';
    }

    function showJoinPanel(error) {
      cleanup();
      showPlaceholder();
      joinPanel.style.display = 'flex';
      roomInput.value = '';
      if (error) {
        roomInput.style.borderColor = '#e94560';
        roomInput.placeholder = error;
        setTimeout(() => {
          roomInput.style.borderColor = '#333';
          roomInput.placeholder = 'Code';
        }, 2000);
      }
    }
  </script>
</body>
</html>
